<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0B1F3A"/>
  <!-- Grid lines -->
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(184,151,90,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Gold accent -->
  <ellipse cx="1050" cy="315" rx="480" ry="480" fill="rgba(184,151,90,0.08)"/>
  <!-- Logo mark -->
  <circle cx="100" cy="100" r="40" fill="#B8975A"/>
  <text x="100" y="113" font-family="Georgia,serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">LC</text>
  <!-- Wordmark -->
  <text x="156" y="96" font-family="Georgia,serif" font-size="20" font-weight="600" fill="white">L&amp;C Royal Management</text>
  <text x="156" y="116" font-family="Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="#B8975A">MIAMI · SOUTH FLORIDA</text>
  <!-- Divider -->
  <line x1="100" y1="175" x2="700" y2="175" stroke="rgba(184,151,90,0.25)" stroke-width="1"/>
  <!-- Headline -->
  <text x="100" y="280" font-family="Georgia,serif" font-size="58" font-weight="300" fill="white">Management that</text>
  <text x="100" y="350" font-family="Georgia,serif" font-size="64" font-weight="700" fill="white">protects your</text>
  <text x="100" y="420" font-family="Georgia,serif" font-size="64" font-weight="700" fill="#B8975A">community.</text>
  <!-- Sub -->
  <text x="100" y="480" font-family="Arial,sans-serif" font-size="20" fill="rgba(255,255,255,0.55)">Full-service HOA &amp; Condo Association Management</text>
  <!-- Stats -->
  <text x="100" y="560" font-family="Georgia,serif" font-size="36" font-weight="600" fill="#B8975A">15+</text>
  <text x="100" y="580" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="2">YEARS IN BUSINESS</text>
  <text x="310" y="560" font-family="Georgia,serif" font-size="36" font-weight="600" fill="#B8975A">(305) 228-7326</text>
  <text x="310" y="580" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="2">CALL TODAY</text>
  <!-- Right badge -->
  <rect x="950" y="240" width="160" height="160" rx="16" fill="#B8975A"/>
  <text x="1030" y="320" font-family="Georgia,serif" font-size="48" font-weight="700" fill="white" text-anchor="middle">A+</text>
  <text x="1030" y="345" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="2">SERVICE</text>
  <text x="1030" y="363" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="2">LEVEL</text>
</svg>
